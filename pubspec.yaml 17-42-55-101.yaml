name: ticketin
description: Event management & QR check-in app powered by Ticketin API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # QR Code
  mobile_scanner: ^4.0.0
  qr_flutter: ^4.1.0

  # Navigation
  go_router: ^13.0.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  intl: ^0.19.0

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne/static/Syne-Regular.ttf
        - asset: assets/fonts/Syne/static/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne/static/Syne-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Syne/static/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne/static/Syne-ExtraBold.ttf
          weight: 800
    - family: DMSans
      fonts:
        - asset: assets/fonts/DM_Sans/static/DMSans-Regular.ttf
        - asset: assets/fonts/DM_Sans/static/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DM_Sans/static/DMSans-SemiBold.ttf
          weight: 600
